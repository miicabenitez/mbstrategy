<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual · MB Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%234a5e4d'/><text x='16' y='21' text-anchor='middle' font-family='serif' font-size='14' font-weight='600' fill='%23f5f0eb'>M</text><text x='22' y='21' text-anchor='middle' font-family='serif' font-size='14' font-weight='600' fill='%23b09088'>B</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f0eb;
  --cream-d:#e8e2d9;
  --green:#4a5e4d;
  --green-dark:#2d3d30;
  --green-light:#e8ede8;
  --terra:#b09088;
  --terra-light:#f0e8e5;
  --gray:#8a8a8a;
  --text:#1a1a1a;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  background:linear-gradient(135deg,#1e2e22 0%,#2d3d30 20%,#3d5242 35%,#4a6150 45%,#3d5242 55%,#2d3d30 75%,#1e2e22 100%);
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 2px 20px rgba(0,0,0,.3);
}
nav::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 60%);
  pointer-events:none;
}
.nav-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 32px;
}
.nav-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;color:white;display:flex;align-items:center;gap:10px;
}
.nav-logo em{font-style:italic;color:var(--terra)}
.nav-logo span{
  font-size:10px;font-weight:500;letter-spacing:.15em;
  text-transform:uppercase;color:rgba(255,255,255,.35);
  border-left:1px solid rgba(255,255,255,.15);
  padding-left:12px;margin-left:2px;font-family:'DM Sans',sans-serif;
}
.nav-link{
  font-size:12px;color:rgba(255,255,255,.5);
  text-decoration:none;transition:color .2s;letter-spacing:.03em;
}
.nav-link:hover{color:white}

/* MODULE TABS */
.mod-tabs{
  display:flex;padding:0 32px;overflow-x:auto;gap:0;
  border-top:1px solid rgba(255,255,255,.06);
}
.mod-tabs::-webkit-scrollbar{display:none}
.mod-tab{
  font-size:11px;font-weight:500;letter-spacing:.04em;
  color:rgba(255,255,255,.38);
  padding:11px 16px;
  border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;
  transition:all .2s;flex-shrink:0;
}
.mod-tab:hover{color:rgba(255,255,255,.75)}
.mod-tab.active{color:white;border-bottom-color:var(--terra)}

/* SUB TABS */
.sub-tabs-wrap{
  background:white;
  border-bottom:1px solid rgba(0,0,0,.07);
  padding:0 32px;
  display:flex;gap:0;overflow-x:auto;
  position:sticky;top:89px;z-index:200;
}
.sub-tabs-wrap::-webkit-scrollbar{display:none}
.sub-tab{
  font-size:12px;color:#999;
  padding:11px 14px;
  border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;
  transition:all .2s;flex-shrink:0;
}
.sub-tab:hover{color:var(--green)}
.sub-tab.active{color:var(--green);font-weight:500;border-bottom-color:var(--green)}

/* CONTENT */
.content-wrap{
  padding-top:89px;
  min-height:100vh;
}
.page{
  max-width:760px;margin:0 auto;
  padding:48px 32px 80px;
  animation:fadeUp .35s ease both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

/* MODULE INDEX */
.mod-index-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,5vw,54px);
  font-weight:400;line-height:1.05;
  color:var(--green-dark);margin-bottom:8px;
}
.mod-index-sub{
  font-size:15px;color:var(--gray);font-weight:300;
  margin-bottom:36px;padding-bottom:28px;
  border-bottom:.5px solid var(--cream-d);
}
.mod-index-label{
  font-size:10px;font-weight:500;letter-spacing:.15em;
  text-transform:uppercase;color:var(--gray);margin-bottom:18px;
}
.mod-index-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;
}
.mod-index-card{
  background:white;border-radius:16px;
  padding:22px 20px;
  border:.5px solid rgba(0,0,0,.07);
  cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
  display:flex;align-items:flex-start;gap:14px;
}
.mod-index-card::after{
  content:'';position:absolute;
  left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--green),var(--terra));
  transform:scaleY(0);transform-origin:top;
  transition:transform .25s ease;
}
.mod-index-card:hover{
  box-shadow:0 8px 28px rgba(0,0,0,.09);
  transform:translateY(-2px);
}
.mod-index-card:hover::after{transform:scaleY(1)}
.mod-index-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--green-light);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--green);
  transition:background .2s,color .2s;
}
.mod-index-card:hover .mod-index-icon{background:var(--green);color:white}
.mod-index-info{}
.mod-index-name{font-size:14px;font-weight:600;color:var(--green-dark);margin-bottom:4px}
.mod-index-desc{font-size:12px;color:var(--gray);line-height:1.55;font-weight:300}

/* HOME */
.home-orb{
  position:absolute;top:89px;right:0;
  width:500px;height:500px;
  background:radial-gradient(circle at 70% 30%,rgba(176,144,136,.12),transparent 70%);
  pointer-events:none;
}
.home-eyebrow{
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--terra);
  display:flex;align-items:center;gap:14px;
  margin-bottom:28px;
  animation:fadeUp .4s ease .1s both;
}
.home-eyebrow::before,.home-eyebrow::after{
  content:'';flex:1 0 30px;max-width:50px;height:1px;
  background:var(--terra);opacity:.3;
}
.home-h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(48px,7vw,72px);
  font-weight:300;line-height:1.05;
  color:var(--green-dark);margin-bottom:8px;
  animation:fadeUp .4s ease .15s both;
}
.home-h1 em{font-style:italic;color:var(--terra);font-weight:300}
.home-sub{
  font-size:16px;color:var(--gray);font-weight:300;line-height:1.7;
  max-width:460px;margin-bottom:52px;
  animation:fadeUp .4s ease .2s both;
}
.home-divider{width:48px;height:1px;background:var(--cream-d);margin-bottom:40px}
.start-label{
  font-size:10px;font-weight:500;letter-spacing:.15em;
  text-transform:uppercase;color:var(--gray);margin-bottom:18px;
}
.start-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:40px}
.start-card{
  background:white;border-radius:18px;padding:26px 22px;
  border:.5px solid rgba(0,0,0,.07);
  cursor:pointer;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.start-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--green),var(--terra));
  transform:scaleX(0);transform-origin:left;
  transition:transform .3s ease;
}
.start-card:hover{box-shadow:0 12px 40px rgba(0,0,0,.1);transform:translateY(-3px)}
.start-card:hover::after{transform:scaleX(1)}
.start-num{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;color:var(--terra);line-height:1;
  margin-bottom:14px;font-weight:300;
}
.start-title{font-size:13px;font-weight:600;color:var(--green-dark);margin-bottom:6px}
.start-desc{font-size:12px;color:var(--gray);line-height:1.6;font-weight:300}
.home-hint{font-size:13px;color:var(--gray);font-style:italic;text-align:center;padding-top:24px;border-top:.5px solid var(--cream-d)}

/* MODULE PAGE */
.mod-kicker{
  font-size:10px;font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;color:var(--terra);margin-bottom:14px;
}
.mod-h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,5vw,54px);
  font-weight:400;line-height:1.05;
  color:var(--green-dark);margin-bottom:12px;
}
.mod-desc{
  font-size:15px;color:#555;font-weight:300;line-height:1.75;
  margin-bottom:36px;padding-bottom:28px;
  border-bottom:.5px solid var(--cream-d);
}
.section{margin-bottom:32px}
.sec-title{
  font-size:10px;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--green);
  margin-bottom:18px;display:flex;align-items:center;gap:12px;
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--green-light),transparent)}
.steps{display:flex;flex-direction:column}
.step{display:flex;gap:18px;padding:16px 0;border-bottom:.5px solid rgba(0,0,0,.05)}
.step:last-child{border-bottom:none}
.step-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.step-num{
  width:30px;height:30px;border-radius:50%;
  background:var(--green);color:white;
  font-size:12px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
}
.step-line{width:1px;flex:1;min-height:10px;background:linear-gradient(180deg,var(--green-light),transparent);margin-top:4px}
.step:last-child .step-line{display:none}
.step-text{font-size:14px;color:#444;line-height:1.7;font-weight:300;padding-top:5px}
.tips{display:flex;flex-direction:column;gap:12px}
.tip{
  display:flex;gap:14px;background:white;border-radius:12px;
  padding:14px 18px;border:.5px solid rgba(0,0,0,.06);
  transition:box-shadow .2s;
}
.tip:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.tip-dot{width:6px;height:6px;border-radius:50%;background:var(--terra);flex-shrink:0;margin-top:7px}
.tip-text{font-size:13.5px;color:#555;line-height:1.65;font-weight:300}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{
  background:white;border-radius:10px;padding:12px 16px;
  border:.5px solid rgba(0,0,0,.06);font-size:13px;color:#555;line-height:1.5;
}
.field strong{display:block;font-size:11px;font-weight:600;color:var(--green-dark);letter-spacing:.03em;margin-bottom:3px}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{
  background:var(--green-light);color:var(--green);font-size:12px;font-weight:500;
  padding:6px 14px;border-radius:20px;cursor:pointer;
  transition:all .2s;border:.5px solid transparent;
}
.badge:hover{background:var(--green);color:white;transform:translateY(-1px);box-shadow:0 4px 12px rgba(74,94,77,.25)}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(245,240,235,.95);backdrop-filter:blur(12px);
  border-top:1px solid rgba(0,0,0,.07);
  padding:14px 32px;
  display:flex;justify-content:space-between;align-items:center;
}
.bn-prev{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--gray);cursor:pointer;
  transition:color .2s;
}
.bn-prev:hover{color:var(--green)}
.bn-progress{font-size:11px;color:#bbb;letter-spacing:.03em}
.bn-next{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:500;color:var(--green);
  background:var(--green-light);padding:8px 18px;
  border-radius:20px;cursor:pointer;transition:all .2s;
}
.bn-next:hover{background:var(--green);color:white;box-shadow:0 4px 16px rgba(74,94,77,.3)}

/* MOBILE */
@media(max-width:640px){
  .nav-top{padding:12px 16px}
  .mod-tabs{padding:0 16px}
  .sub-tabs-wrap{padding:0 16px;top:84px}
  .content-wrap{padding-top:84px}
  .page{padding:32px 16px 80px}
  .start-grid{grid-template-columns:1fr}
  .fields{grid-template-columns:1fr}
  .home-h1{font-size:38px}
  .bottom-nav{padding:12px 16px}
}

/* ── Cajero guide ─────────────────────────────────────────── */
.caj-hero{font-family:'Cormorant Garamond',Georgia,serif;font-size:52px;font-weight:300;line-height:1.15;color:#2d2a26;margin:8px 0 16px}
.caj-hero em{font-style:italic;color:var(--terra);font-weight:300}
.caj-pills{display:flex;gap:8px;flex-wrap:wrap;margin:28px 0}
.caj-pill{display:flex;flex-direction:column;align-items:center;padding:10px 18px;border-radius:12px;border:1.5px solid #e0dbd6;background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.caj-pill span{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:#888;line-height:1}
.caj-pill em{font-size:11px;color:#aaa;font-style:normal;margin-top:3px;white-space:nowrap}
.caj-pill.active{border-color:#3a4e3d;background:#3a4e3d}
.caj-pill.active span{color:#fff}
.caj-pill.active em{color:rgba(255,255,255,.65)}
.caj-pill:hover:not(.active){border-color:#3a4e3d}
.caj-section{display:none}
.caj-section.active{display:block}
.caj-step-header{display:flex;align-items:baseline;gap:16px;margin-bottom:8px;margin-top:32px}
.caj-num{font-family:'DM Sans',sans-serif;font-size:72px;font-weight:300;color:#ddd8d2;line-height:1}
.caj-title{font-family:'DM Sans',sans-serif;font-size:28px;font-weight:700;color:#2d2a26;margin-bottom:0}
.caj-screen{border-radius:16px;overflow:hidden;border:1px solid #e0dbd6;margin:24px 0;box-shadow:0 6px 28px rgba(0,0,0,.09);font-family:'DM Sans',sans-serif;max-width:520px}
.caj-tip-green{background:rgba(58,78,61,.06);border-left-color:#3a4e3d}
.caj-tip-green .tip-dot{background:#3a4e3d}
.caj-tip-alert{background:rgba(176,144,136,.1);border-left-color:#b09088}
.caj-tip-alert .tip-dot{background:#b09088}
@media(max-width:640px){.caj-hero{font-size:38px}.caj-pill em{display:none}.caj-pill{padding:8px 12px}.caj-screen{max-width:100%}}
</style>
</head>
<body>

<nav>
  <div class="nav-top">
    <div class="nav-logo" onclick="goPage('bienvenida')" style="cursor:pointer">
      <em>MB</em> Strategy
      <span>Manual de uso</span>
    </div>
    <a href="https://sistema.mbstrategy.com.ar" class="nav-link">Ir al sistema →</a>
  </div>
  <div class="mod-tabs" id="mod-tabs"></div>
</nav>

<div class="sub-tabs-wrap" id="sub-tabs-wrap" style="display:none"></div>

<div class="content-wrap">
  <div class="page" id="page-content"></div>
</div>

<div class="bottom-nav" id="bottom-nav" style="display:none">
  <div class="bn-prev" id="bn-prev" onclick="goAdj(-1)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span id="bn-prev-label"></span>
  </div>
  <div class="bn-progress" id="bn-progress"></div>
  <div class="bn-next" id="bn-next" onclick="goAdj(1)">
    <span id="bn-next-label"></span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
  </div>
</div>

<script>
const MODULES = [
  { id:'bienvenida', label:'Bienvenida', subs:[] },
  { id:'inicio-mod', label:'Inicio', subs:[] },
  { id:'finanzas', label:'Finanzas', subs:[
    {id:'caja',label:'Caja'},
    {id:'cierre',label:'Cierre de período'},
    {id:'config-caja',label:'Configuración'},
    {id:'mis-facturas',label:'Mis Facturas'},
    {id:'resumen-ventas',label:'Resumen de Ventas'},
    {id:'resumen-compras',label:'Resumen de Compras'},
  ]},
  { id:'comercial', label:'Comercial', subs:[
    {id:'clientes',label:'Clientes'},
    {id:'cobranzas',label:'Cobranzas'},
    {id:'presupuestos',label:'Presupuestos'},
    {id:'catalogo',label:'Catálogo'},
  ]},
  { id:'compras', label:'Compras', subs:[
    {id:'proveedores',label:'Proveedores'},
    {id:'necesidades',label:'Necesidades'},
    {id:'ordenes',label:'Órdenes'},
    {id:'historial',label:'Historial'},
    {id:'config-compras',label:'Configuración'},
  ]},
  { id:'control', label:'Control del negocio', subs:[
    {id:'calculador',label:'Calculador de costos'},
    {id:'indicadores',label:'Indicadores'},
  ]},
  { id:'gestion', label:'Gestión', subs:[
    {id:'plan-accion',label:'Plan de acción'},
  ]},
  { id:'cajero', label:'Cajero', subs:[] },
  { id:'micuenta', label:'Mi cuenta', subs:[
    {id:'datos-negocio',label:'Datos del negocio'},
    {id:'datos-fiscales',label:'Datos fiscales'},
    {id:'arca',label:'Config. ARCA'},
    {id:'membresia',label:'Membresía'},
  ]},
];

const ALL_PAGES = [];
MODULES.forEach(m => {
  if(m.subs.length === 0 && m.id !== 'bienvenida') ALL_PAGES.push({id:m.id,label:m.label,mod:m.id});
  m.subs.forEach(s => ALL_PAGES.push({id:s.id,label:s.label,mod:m.id}));
});

let currentMod = 'home';
let currentSub = null;

function mod(kicker, title, desc, steps, fields, tips, badges) {
  const stepsHtml = steps.map((s,i) => `
    <div class="step">
      <div class="step-left"><div class="step-num">${i+1}</div><div class="step-line"></div></div>
      <div class="step-text">${s}</div>
    </div>`).join('');
  const fieldsHtml = fields.length ? `<div class="section"><div class="sec-title">Datos que necesitás</div><div class="fields">${fields.map(f=>`<div class="field"><strong>${f[0]}</strong>${f[1]}</div>`).join('')}</div></div>` : '';
  const tipsHtml = tips.map(t=>`<div class="tip"><div class="tip-dot"></div><div class="tip-text">${t}</div></div>`).join('');
  const badgesHtml = badges.map(([l,id])=>`<div class="badge" onclick="goPage('${id}')">${l}</div>`).join('');
  return `
    <div class="mod-kicker">${kicker}</div>
    <h1 class="mod-h1">${title}</h1>
    <p class="mod-desc">${desc}</p>
    <div class="section"><div class="sec-title">Cómo se usa</div><div class="steps">${stepsHtml}</div></div>
    ${fieldsHtml}
    <div class="section"><div class="sec-title">Tips importantes</div><div class="tips">${tipsHtml}</div></div>
    ${badgesHtml.length?`<div class="section"><div class="sec-title">Se conecta con</div><div class="badges">${badgesHtml}</div></div>`:''}
  `;
}

const PAGES = {
bienvenida: `
  <div style="position:relative">
    <div class="home-eyebrow">MB Strategy · Manual de uso</div>
    <h1 class="home-h1">Bienvenido al<br>manual de uso<br><em>completo.</em></h1>
    <p class="home-sub">Cada módulo explicado en lenguaje simple. Sin tecnicismos, sin vueltas. Todo lo que necesitás para operar tu negocio desde el primer día.</p>
    <div class="home-divider"></div>
    <div class="start-label">¿Es tu primera vez? Empezá por acá</div>
    <div class="start-grid">
      <div class="start-card" onclick="goPage('datos-negocio')">
        <div class="start-num">01</div>
        <div class="start-title">Datos del negocio</div>
        <div class="start-desc">Nombre, logo, teléfono y email. Lo que aparece en todas tus facturas y presupuestos.</div>
      </div>
      <div class="start-card" onclick="goPage('datos-fiscales')">
        <div class="start-num">02</div>
        <div class="start-title">Datos fiscales</div>
        <div class="start-desc">Tu condición ante AFIP y punto de venta ARCA. Necesario para facturar.</div>
      </div>
      <div class="start-card" onclick="goPage('config-caja')">
        <div class="start-num">03</div>
        <div class="start-title">Configuración de Caja</div>
        <div class="start-desc">Tus cuentas (efectivo, banco, MP) y los conceptos de ingreso y egreso.</div>
      </div>
    </div>
    <p class="home-hint">¿Ya sabés lo que buscás? Usá las pestañas de arriba.</p>
  </div>
`,
'inicio-mod': mod('Panel principal','Inicio','El dashboard que resume la salud del negocio al entrar. Muestra la ganancia del mes, tu margen, cuánto te deben los clientes y si el negocio está en buen estado. Se actualiza automáticamente.',

  MODULES.forEach(m => {
    if(m.id === 'bienvenida') return;
    const t = document.createElement('div');
    t.className = 'mod-tab';
    t.textContent = m.label;
    t.onclick = () => goModule(m.id);
    tabsEl.appendChild(t);
  });
}

function buildModIndex(modId) {
  const meta = MOD_META[modId];
  const m = MODULES.find(x => x.id === modId);
  if(!meta) return null;
  const cards = m.subs.map(s => {
    const sm = meta.subs[s.id] || {};
    return `<div class="mod-index-card" onclick="goPage('${s.id}')">
      <div class="mod-index-icon">${sm.icon||''}</div>
      <div class="mod-index-info">
        <div class="mod-index-name">${s.label}</div>
        <div class="mod-index-desc">${sm.desc||''}</div>
      </div>
    </div>`;
  }).join('');
  return `
    <h1 class="mod-index-title">${m.label}</h1>
    <p class="mod-index-sub">${meta.desc}</p>
    <div class="mod-index-label">¿Qué querés aprender?</div>
    <div class="mod-index-grid">${cards}</div>
  `;
}

function goModule(modId) {
  currentMod = modId;
  const m = MODULES.find(x => x.id === modId);
  const visibleMods = MODULES.filter(x => x.id !== 'bienvenida');
  document.querySelectorAll('.mod-tab').forEach((t,i) => t.classList.toggle('active', visibleMods[i]?.id === modId));
  const subWrap = document.getElementById('sub-tabs-wrap');
  subWrap.innerHTML = '';
  if(m.subs.length > 0) {
    subWrap.style.display = 'flex';
    m.subs.forEach(s => {
      const t = document.createElement('div');
      t.className = 'sub-tab';
      t.textContent = s.label;
      t.onclick = () => goPage(s.id);
      subWrap.appendChild(t);
    });
    subWrap.style.display = 'none';
    const content = document.getElementById('page-content');
    content.style.opacity = '0';
    content.style.transform = 'translateY(10px)';
    setTimeout(() => {
      content.innerHTML = buildModIndex(modId);
      content.style.transition = 'opacity .3s ease, transform .3s ease';
      content.style.opacity = '1';
      content.style.transform = 'translateY(0)';
      window.scrollTo(0,0);
    }, 150);
    document.getElementById('bottom-nav').style.display = 'none';
  } else {
    subWrap.style.display = 'none';
    goPage(modId);
  }
}

function goPage(pageId) {
  const content = document.getElementById('page-content');
  content.style.opacity = '0';
  content.style.transform = 'translateY(10px)';
  setTimeout(() => {
    content.innerHTML = PAGES[pageId] || '<p>Contenido próximamente.</p>';
    content.style.transition = 'opacity .3s ease, transform .3s ease';
    content.style.opacity = '1';
    content.style.transform = 'translateY(0)';
    window.scrollTo(0,0);
  }, 150);
  document.querySelectorAll('.sub-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === (MODULES.flatMap(m=>m.subs).find(s=>s.id===pageId)||{}).label);
  });
  const parentMod = MODULES.find(m => m.subs.some(s=>s.id===pageId) || m.id===pageId);
  if(parentMod) {
    currentMod = parentMod.id;
    const visibleMods2 = MODULES.filter(x => x.id !== 'bienvenida');
    document.querySelectorAll('.mod-tab').forEach((t,i) => t.classList.toggle('active', visibleMods2[i]?.id === parentMod.id));
    const subWrap = document.getElementById('sub-tabs-wrap');
    if(parentMod.subs.length > 0 && subWrap.children.length === 0) {
      subWrap.style.display = 'none';
      parentMod.subs.forEach(s => {
        const t = document.createElement('div');
        t.className = 'sub-tab' + (s.id === pageId ? ' active' : '');
        t.textContent = s.label;
        t.onclick = () => goPage(s.id);
        subWrap.appendChild(t);
      });
    }
  }
  updateBottomNav(pageId);
}

function updateBottomNav(pageId) {
  const idx = ALL_PAGES.findIndex(p => p.id === pageId);
  const bn = document.getElementById('bottom-nav');
  if(pageId === 'bienvenida'){ bn.style.display='none'; return; }
  bn.style.display = 'flex';
  const prev = ALL_PAGES[idx-1];
  const next = ALL_PAGES[idx+1];
  document.getElementById('bn-prev-label').textContent = prev ? prev.label : '';
  document.getElementById('bn-prev').style.opacity = prev ? '1' : '0';
  document.getElementById('bn-next-label').textContent = next ? next.label : '';
  document.getElementById('bn-next').style.opacity = next ? '1' : '0';
  document.getElementById('bn-progress').textContent = `${idx} / ${ALL_PAGES.length - 1}`;
}

function goAdj(dir) {
  const allIds = ALL_PAGES.map(p=>p.id);
  const subActive = document.querySelector('.sub-tab.active');
  let currentId = 'home';
  if(subActive) {
    const parentMod = MODULES.find(m=>m.id===currentMod);
    const sub = parentMod?.subs.find(s=>s.label===subActive.textContent);
    if(sub) currentId = sub.id;
  } else { currentId = currentMod; }
  const idx = allIds.indexOf(currentId);
  const newIdx = idx + dir;
  if(newIdx >= 0 && newIdx < allIds.length) goPage(allIds[newIdx]);
}

function cajStep(n) {
  document.querySelectorAll('.caj-section').forEach((s,i) => s.classList.toggle('active', i===n));
  document.querySelectorAll('.caj-pill').forEach((p,i) => p.classList.toggle('active', i===n));
  window.scrollTo(0,0);
}

const IS_CAJERO = new URLSearchParams(location.search).get('rol') === 'cajero';
if(IS_CAJERO) {
  const _keep = new Set(['bienvenida','cajero']);
  MODULES.splice(0, MODULES.length, ...MODULES.filter(m => _keep.has(m.id)));
  ALL_PAGES.length = 0;
  MODULES.forEach(m => {
    if(m.subs.length === 0 && m.id !== 'bienvenida') ALL_PAGES.push({id:m.id,label:m.label,mod:m.id});
    m.subs.forEach(s => ALL_PAGES.push({id:s.id,label:s.label,mod:m.id}));
  });
  document.querySelector('.nav-logo span').textContent = 'Tu guía de uso';
}
buildNav();
if(IS_CAJERO) goPage('cajero'); else goPage('bienvenida');
</script>
