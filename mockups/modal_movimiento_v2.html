<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px; }

@keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.modal {
  background: white; border-radius: 18px; padding: 28px;
  width: 100%; max-width: 460px;
  animation: modalIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  box-shadow: 0 8px 40px rgba(0,0,0,0.1);
  height: fit-content;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.modal-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.btn-close { background: none; border: none; cursor: pointer; color: #ccc; font-size: 20px; }

.tipo-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.tipo-btn {
  padding: 12px 8px; border-radius: 10px;
  border: 1.5px solid #e8e8e8; background: white;
  cursor: pointer; text-align: center;
  transition: all 0.15s; font-family: inherit;
}
.tipo-btn.active.ingreso { border-color: #4a5e4d; background: #f0f5f0; }
.tipo-btn.active.egreso { border-color: #993C1D; background: #fdf0ec; }
.tipo-btn.active.transfer { border-color: #185FA5; background: #e6f1fb; }
.tipo-icon { margin-bottom: 6px; }
.tipo-label { font-size: 12px; font-weight: 600; color: #555; }
.tipo-btn.active.ingreso .tipo-label { color: #4a5e4d; }
.tipo-btn.active.egreso .tipo-label { color: #993C1D; }
.tipo-btn.active.transfer .tipo-label { color: #185FA5; }

.section-label { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 0.06em; display: block; margin-bottom: 8px; }

.conceptos-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0; }
.concepto-chip {
  padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid #e8e8e8; background: white;
  font-size: 12px; font-weight: 500; color: #666;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.concepto-chip:hover { border-color: #4a5e4d; color: #4a5e4d; }
.concepto-chip.active { background: #4a5e4d; color: white; border-color: #4a5e4d; }
.concepto-chip.active.egreso-chip { background: #993C1D; border-color: #993C1D; }
.concepto-chip.nuevo { border-style: dashed; color: #4a5e4d; border-color: #c8d5c9; background: transparent; }
.concepto-chip.nuevo:hover { background: #f0f5f0; }

.evolutivo-hint {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 12px; background: #edf4ee;
  border-radius: 8px; margin-top: 12px;
}
.evolutivo-hint p { font-size: 11px; color: #3B6D11; line-height: 1.4; }

.nuevo-concepto-input {
  display: none; margin-top: 10px;
}
.nuevo-concepto-input.visible { display: flex; gap: 8px; animation: fadeIn 0.2s ease both; }
.nuevo-concepto-input input {
  flex: 1; padding: 8px 12px;
  border: 1.5px solid #4a5e4d; border-radius: 8px;
  font-size: 13px; outline: none; font-family: inherit;
}
.btn-agregar-concepto {
  padding: 8px 14px; background: #4a5e4d; color: white;
  border: none; border-radius: 8px; font-size: 12px;
  font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap;
}

.divider { height: 0.5px; background: #f0efeb; margin: 18px 0; }

.field { margin-bottom: 14px; }
.field label { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 13px;
  border: 1.5px solid #e8e8e8; border-radius: 8px;
  font-size: 13px; color: #2c2c2a; background: #fafafa;
  outline: none; font-family: inherit; transition: border 0.15s;
}
.field input:focus, .field select:focus { border-color: #4a5e4d; background: white; }
.field textarea { resize: none; height: 56px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.transfer-wrap { display: flex; align-items: flex-end; gap: 10px; }
.transfer-wrap .field { flex: 1; margin: 0; }
.transfer-arrow { color: #888; flex-shrink: 0; padding-bottom: 10px; }

.modal-footer { display: flex; gap: 10px; margin-top: 6px; }
.btn-cancel { flex: 1; padding: 13px; background: white; border: 1.5px solid #e8e8e8; border-radius: 10px; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; font-family: inherit; }
.btn-save { flex: 2; padding: 13px; background: #4a5e4d; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; color: white; cursor: pointer; font-family: inherit; }

</style>
</head>
<body>

<!-- MODAL PRINCIPAL -->
<div class="modal">
  <div class="modal-header">
    <div class="modal-title">Nuevo movimiento</div>
    <button class="btn-close">×</button>
  </div>

  <span class="section-label">TIPO</span>
  <div class="tipo-row">
    <button class="tipo-btn active ingreso" onclick="setTipo('ingreso', this)">
      <div class="tipo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a5e4d" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </div>
      <div class="tipo-label">Ingreso</div>
    </button>
    <button class="tipo-btn egreso" onclick="setTipo('egreso', this)">
      <div class="tipo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#993C1D" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
      </div>
      <div class="tipo-label">Egreso</div>
    </button>
    <button class="tipo-btn transfer" onclick="setTipo('transfer', this)">
      <div class="tipo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </div>
      <div class="tipo-label">Entre cuentas</div>
    </button>
  </div>

  <div id="concepto-section">
    <span class="section-label">CONCEPTO</span>
    <div class="conceptos-list" id="conceptos-list"></div>
    <div class="nuevo-concepto-input" id="nuevo-concepto-input">
      <input type="text" placeholder="Nombre del nuevo concepto..." id="nuevo-concepto-txt">
      <button class="btn-agregar-concepto" onclick="agregarConcepto()">Agregar</button>
    </div>
    <div class="evolutivo-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <p>Usando siempre el mismo concepto podés ver su evolución mes a mes en Indicadores.</p>
    </div>
  </div>

  <div class="divider"></div>

  <div id="campos-normal">
    <div class="row">
      <div class="field"><label>FECHA</label><input type="date" value="2026-03-28"></div>
      <div class="field"><label>MONTO ($)</label><input type="number" placeholder="0,00"></div>
    </div>
    <div class="field"><label>CUENTA</label>
      <select><option>Banco Supervielle</option><option>Caja chica</option><option>Mercado Pago</option></select>
    </div>
    <div class="field"><label>DETALLE (opcional)</label><textarea placeholder="Descripción adicional..."></textarea></div>
  </div>

  <div id="campos-transfer" style="display:none;">
    <div class="row">
      <div class="field"><label>FECHA</label><input type="date" value="2026-03-28"></div>
      <div class="field"><label>MONTO ($)</label><input type="number" placeholder="0,00"></div>
    </div>
    <div class="transfer-wrap">
      <div class="field"><label>DESDE</label>
        <select><option>Banco Supervielle</option><option>Caja chica</option><option>Mercado Pago</option></select>
      </div>
      <div class="transfer-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
      <div class="field"><label>HACIA</label>
        <select><option>Caja chica</option><option>Banco Supervielle</option><option>Mercado Pago</option></select>
      </div>
    </div>
    <div class="field" style="margin-top:14px;"><label>DETALLE (opcional)</label><textarea placeholder="Motivo de la transferencia..."></textarea></div>
  </div>

  <div class="modal-footer">
    <button class="btn-cancel">Cancelar</button>
    <button class="btn-save">Guardar</button>
  </div>
</div>

<script>
var currentTipo = 'ingreso';

var conceptosPorTipo = {
  ingreso: ['Cobro de cliente','Adelanto','Reembolso','Otro'],
  egreso: ['Alquiler','Sueldos','Insumos','Gastos bancarios','Comisión MP','Servicios','Otro']
};

function setTipo(tipo, btn) {
  document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTipo = tipo;

  var concSection = document.getElementById('concepto-section');
  var normal = document.getElementById('campos-normal');
  var transfer = document.getElementById('campos-transfer');
  document.getElementById('nuevo-concepto-input').classList.remove('visible');

  if (tipo === 'transfer') {
    concSection.style.display = 'none';
    normal.style.display = 'none';
    transfer.style.display = 'block';
  } else {
    concSection.style.display = 'block';
    normal.style.display = 'block';
    transfer.style.display = 'none';
    renderConceptos(tipo);
  }
}

function renderConceptos(tipo) {
  var list = document.getElementById('conceptos-list');
  var conceptos = conceptosPorTipo[tipo] || [];
  var isEgreso = tipo === 'egreso';

  list.innerHTML = conceptos.map((c, i) =>
    '<button class="concepto-chip' + (i===0 ? (' active' + (isEgreso?' egreso-chip':'')) : (isEgreso?' egreso-chip':'')) + '" onclick="selConcepto(this)">' + c + '</button>'
  ).join('') + '<button class="concepto-chip nuevo" onclick="toggleNuevo()">+ Nuevo concepto</button>';
}

function selConcepto(btn) {
  btn.closest('.conceptos-list').querySelectorAll('.concepto-chip:not(.nuevo)').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleNuevo() {
  var el = document.getElementById('nuevo-concepto-input');
  el.classList.toggle('visible');
  if (el.classList.contains('visible')) {
    document.getElementById('nuevo-concepto-txt').focus();
  }
}

function agregarConcepto() {
  var txt = document.getElementById('nuevo-concepto-txt').value.trim();
  if (!txt) return;
  conceptosPorTipo[currentTipo].splice(-1, 0, txt); // insertar antes de "Otro"
  document.getElementById('nuevo-concepto-txt').value = '';
  document.getElementById('nuevo-concepto-input').classList.remove('visible');
  renderConceptos(currentTipo);
  // seleccionar el recién creado
  var chips = document.querySelectorAll('#conceptos-list .concepto-chip:not(.nuevo)');
  chips.forEach(c => { if (c.textContent === txt) c.click(); });
}

// render inicial
renderConceptos('ingreso');
</script>
</body>
</html>
