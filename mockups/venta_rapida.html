<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: #f0efeb;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

@keyframes modalIn {
  from { opacity:0; transform: translateY(16px) scale(0.98); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(6px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(74,94,77,0.15); } 50% { box-shadow: 0 0 0 6px rgba(74,94,77,0); } }

/* OVERLAY */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.18);
  backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease both;
}

/* MODAL */
.modal {
  background: #fff;
  border-radius: 22px;
  width: 100%; max-width: 520px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.06);
  animation: modalIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  display: flex; flex-direction: column;
  max-height: 90vh;
}

/* HEADER */
.modal-header {
  padding: 22px 24px 18px;
  border-bottom: 1px solid #f0efeb;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: #4a5e4d; display: flex; align-items: center; justify-content: center;
}
.modal-title { font-size: 16px; font-weight: 650; color: #111; letter-spacing: -0.01em; }
.modal-sub { font-size: 12px; color: #999; margin-top: 1px; }
.btn-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: #f5f4f0; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #888; font-size: 16px; line-height: 1;
  transition: background 0.15s, color 0.15s;
}
.btn-close:hover { background: #ece9e3; color: #333; }

/* BODY SCROLL */
.modal-body {
  overflow-y: auto; flex: 1;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 20px;
}

/* BUSCADOR */
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; }
.search-input {
  width: 100%; padding: 11px 13px 11px 40px;
  border: 1.5px solid #e8e8e4; border-radius: 11px;
  font-size: 14px; color: #1a1a1a; background: #fafafa;
  outline: none; font-family: inherit;
  transition: border 0.15s, background 0.15s;
}
.search-input:focus { border-color: #4a5e4d; background: #fff; }
.search-input::placeholder { color: #bbb; }

/* PRODUCTOS SELECCIONADOS */
.selected-section { display: none; flex-direction: column; gap: 8px; }
.selected-section.visible { display: flex; animation: slideUp 0.25s ease both; }
.section-label {
  font-size: 10px; font-weight: 700; color: #aaa;
  letter-spacing: 0.07em; margin-bottom: 2px;
}

/* ITEM CARRITO */
.cart-item {
  display: flex; align-items: center; gap: 12px;
  background: #f8faf8; border: 1.5px solid #dce8dc;
  border-radius: 12px; padding: 12px 14px;
  animation: slideUp 0.2s ease both;
}
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 13px; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-unit { font-size: 11px; color: #888; margin-top: 1px; }
.cart-qty {
  display: flex; align-items: center; gap: 8px;
}
.qty-btn {
  width: 26px; height: 26px; border-radius: 8px;
  border: 1.5px solid #dce8dc; background: white;
  cursor: pointer; font-size: 16px; color: #4a5e4d;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; line-height: 1; transition: all 0.12s;
}
.qty-btn:hover { background: #4a5e4d; color: white; border-color: #4a5e4d; }
.qty-display {
  width: 28px; text-align: center;
  font-size: 14px; font-weight: 600; color: #1a1a1a;
}
.cart-item-price { font-size: 14px; font-weight: 650; color: #4a5e4d; white-space: nowrap; min-width: 80px; text-align: right; }
.btn-remove { background: none; border: none; cursor: pointer; color: #ccc; padding: 2px; transition: color 0.12s; }
.btn-remove:hover { color: #993C1D; }

/* SUGERIDOS / RESULTADOS */
.products-section { display: flex; flex-direction: column; gap: 6px; }
.product-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; border-radius: 10px;
  border: 1.5px solid #eee; background: #fafafa;
  cursor: pointer; transition: all 0.12s;
}
.product-row:hover { border-color: #4a5e4d; background: #f5faf5; }
.product-row:hover .btn-add-prod { background: #4a5e4d; color: white; }
.product-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.product-price { font-size: 13px; color: #666; }
.btn-add-prod {
  width: 26px; height: 26px; border-radius: 7px;
  background: #f0f5f0; border: none; cursor: pointer;
  color: #4a5e4d; font-size: 16px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  line-height: 1; transition: all 0.12s; flex-shrink: 0;
}

/* METODO DE PAGO */
.pago-section {}
.metodos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.metodo-btn {
  padding: 11px 8px; border-radius: 10px;
  border: 1.5px solid #e8e8e4; background: white;
  cursor: pointer; text-align: center; font-family: inherit;
  transition: all 0.15s;
}
.metodo-btn:hover { border-color: #4a5e4d; }
.metodo-btn.active { border-color: #4a5e4d; background: #f2f7f2; }
.metodo-icon { margin-bottom: 5px; }
.metodo-label { font-size: 12px; font-weight: 600; color: #555; }
.metodo-btn.active .metodo-label { color: #4a5e4d; }

/* FOOTER */
.modal-footer {
  padding: 16px 24px 20px;
  border-top: 1px solid #f0efeb;
  flex-shrink: 0;
}
.total-row {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 14px;
}
.total-label { font-size: 12px; font-weight: 600; color: #aaa; letter-spacing: 0.05em; }
.total-amount { font-size: 28px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.02em; }
.total-amount span { font-size: 16px; font-weight: 500; color: #888; margin-right: 2px; }
.btn-save {
  width: 100%; padding: 15px;
  background: #4a5e4d; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 650; color: white;
  cursor: pointer; font-family: inherit; letter-spacing: -0.01em;
  transition: all 0.15s; position: relative; overflow: hidden;
}
.btn-save:hover { background: #3d4f40; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(74,94,77,0.3); }
.btn-save:disabled { background: #c8d5c9; transform: none; box-shadow: none; cursor: not-allowed; }
.btn-save-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }

/* EMPTY STATE */
.empty-hint {
  text-align: center; padding: 16px 0 8px;
  color: #ccc; font-size: 13px; display: none;
}
</style>
</head>
<body>

<div class="overlay">
<div class="modal">

  <!-- HEADER -->
  <div class="modal-header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </div>
      <div>
        <div class="modal-title">Venta caja</div>
        <div class="modal-sub">Venta directa con productos</div>
      </div>
    </div>
    <button class="btn-close" onclick="cerrar()">×</button>
  </div>

  <!-- BODY -->
  <div class="modal-body">

    <!-- BÚSQUEDA -->
    <div>
      <div class="section-label" style="margin-bottom:8px;">PRODUCTOS</div>
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" type="text" placeholder="Buscar producto..." id="search-input" oninput="filtrar(this.value)" onfocus="mostrarSugeridos()">
      </div>
    </div>

    <!-- CARRITO (items seleccionados) -->
    <div class="selected-section" id="carrito-section">
      <div class="section-label">EN ESTA VENTA</div>
      <div id="carrito-items"></div>
    </div>

    <!-- RESULTADOS / SUGERIDOS -->
    <div class="products-section" id="products-list">
      <div class="section-label">CATÁLOGO</div>
      <!-- se renderiza por JS -->
    </div>

    <div class="empty-hint" id="empty-hint">No se encontraron productos con ese nombre.</div>

    <!-- MÉTODO DE PAGO -->
    <div class="pago-section">
      <div class="section-label" style="margin-bottom:8px;">MÉTODO DE PAGO</div>
      <div class="metodos">
        <button class="metodo-btn active" onclick="setMetodo('efectivo', this)">
          <div class="metodo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a5e4d" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
            </svg>
          </div>
          <div class="metodo-label">Efectivo</div>
        </button>
        <button class="metodo-btn" onclick="setMetodo('mp', this)">
          <div class="metodo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
          </div>
          <div class="metodo-label">Mercado Pago</div>
        </button>
        <button class="metodo-btn" onclick="setMetodo('transferencia', this)">
          <div class="metodo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 014-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 01-4 4H3"/>
            </svg>
          </div>
          <div class="metodo-label">Transferencia</div>
        </button>
      </div>
    </div>

  </div>

  <!-- FOOTER TOTAL -->
  <div class="modal-footer">
    <div class="total-row">
      <span class="total-label">TOTAL</span>
      <span class="total-amount" id="total-display"><span>$</span><span id="total-num">0</span></span>
    </div>
    <button class="btn-save" id="btn-save" disabled onclick="guardar()">
      <div class="btn-save-inner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Registrar venta
      </div>
    </button>
  </div>

</div>
</div>

<script>
// Catálogo de ejemplo
var catalogo = [
  { id:1, nombre:'Torta de chocolate', precio:12500, unidad:'por unidad' },
  { id:2, nombre:'Alfajores x12', precio:8400, unidad:'por caja' },
  { id:3, nombre:'Budín de naranja', precio:6800, unidad:'por unidad' },
  { id:4, nombre:'Medialunas x6', precio:4200, unidad:'por paquete' },
  { id:5, nombre:'Cheesecake porciones', precio:5500, unidad:'por porción' },
  { id:6, nombre:'Brownie', precio:2800, unidad:'por unidad' },
];

var carrito = {}; // id → { producto, qty }
var metodo = 'efectivo';

function fmt(n) {
  return n.toLocaleString('es-AR');
}

function renderProductos(lista) {
  var sec = document.getElementById('products-list');
  var empty = document.getElementById('empty-hint');

  if (lista.length === 0) {
    sec.innerHTML = '<div class="section-label">CATÁLOGO</div>';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  var html = '<div class="section-label">CATÁLOGO</div>';
  lista.forEach(function(p) {
    var enCarrito = carrito[p.id];
    html += '<div class="product-row" onclick="agregar(' + p.id + ')">' +
      '<div>' +
        '<div class="product-name">' + p.nombre + '</div>' +
        '<div class="product-price">$' + fmt(p.precio) + ' · ' + p.unidad + '</div>' +
      '</div>' +
      '<button class="btn-add-prod" onclick="event.stopPropagation();agregar(' + p.id + ')">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
      '</button>' +
    '</div>';
  });
  sec.innerHTML = html;
}

function renderCarrito() {
  var ids = Object.keys(carrito);
  var section = document.getElementById('carrito-section');
  var itemsEl = document.getElementById('carrito-items');
  var btnSave = document.getElementById('btn-save');
  var totalEl = document.getElementById('total-num');

  if (ids.length === 0) {
    section.classList.remove('visible');
    btnSave.disabled = true;
    totalEl.textContent = '0';
    return;
  }

  section.classList.add('visible');
  btnSave.disabled = false;

  var total = 0;
  var html = '';
  ids.forEach(function(id) {
    var item = carrito[id];
    var subtotal = item.producto.precio * item.qty;
    total += subtotal;
    html += '<div class="cart-item">' +
      '<div class="cart-item-info">' +
        '<div class="cart-item-name">' + item.producto.nombre + '</div>' +
        '<div class="cart-item-unit">$' + fmt(item.producto.precio) + ' c/u</div>' +
      '</div>' +
      '<div class="cart-qty">' +
        '<button class="qty-btn" onclick="cambiarQty(' + id + ', -1)">−</button>' +
        '<span class="qty-display">' + item.qty + '</span>' +
        '<button class="qty-btn" onclick="cambiarQty(' + id + ', 1)">+</button>' +
      '</div>' +
      '<div class="cart-item-price">$' + fmt(subtotal) + '</div>' +
      '<button class="btn-remove" onclick="quitar(' + id + ')" title="Quitar">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
      '</button>' +
    '</div>';
  });

  itemsEl.innerHTML = html;
  totalEl.textContent = fmt(total);
}

function agregar(id) {
  var p = catalogo.find(function(x){ return x.id === id; });
  if (!p) return;
  if (carrito[id]) {
    carrito[id].qty++;
  } else {
    carrito[id] = { producto: p, qty: 1 };
  }
  renderCarrito();
}

function cambiarQty(id, delta) {
  if (!carrito[id]) return;
  carrito[id].qty += delta;
  if (carrito[id].qty <= 0) delete carrito[id];
  renderCarrito();
}

function quitar(id) {
  delete carrito[id];
  renderCarrito();
}

function filtrar(q) {
  var lista = q.trim() === ''
    ? catalogo
    : catalogo.filter(function(p){ return p.nombre.toLowerCase().includes(q.toLowerCase()); });
  renderProductos(lista);
}

function mostrarSugeridos() {
  renderProductos(catalogo);
}

function setMetodo(m, btn) {
  metodo = m;
  document.querySelectorAll('.metodo-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  btn.querySelector('.metodo-label').style.color = '#4a5e4d';
}

function guardar() {
  alert('Venta registrada en el libro de caja.');
}

function cerrar() {
  document.querySelector('.overlay').style.opacity = '0';
  document.querySelector('.overlay').style.transition = 'opacity 0.2s';
}

// init
renderProductos(catalogo);
</script>
</body>
</html>
